{% extends "base.html" %}
{% block title %}AI Chat{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;height:calc(100vh - 56px)">
    <div class="page-header" style="margin-bottom:0">
        <div>
            <h1 class="page-title">AI Chat</h1>
            <p class="page-subtitle">Ask about your pipeline, prospects, or anything else</p>
        </div>
    </div>

    <div class="card" style="flex:1;display:flex;flex-direction:column;margin-top:16px;padding:0;overflow:hidden">
        <div id="fullChatMessages" style="flex:1;overflow-y:auto;padding:16px">
            <div class="text-muted" style="text-align:center;padding:40px">
                <div style="font-size:24px;margin-bottom:8px">&#9883;</div>
                <div>Ask me anything about your pipeline</div>
                <div style="font-size:11px;margin-top:4px">Try: "Who should I call today?" or "How's my pipeline looking?"</div>
            </div>
        </div>
        <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px">
            <input type="text" class="form-input" id="fullChatInput" placeholder="Type or tap mic to talk..." style="margin:0;flex:1"
                   onkeydown="if(event.key==='Enter')sendFullChat()">
            <button id="fullVoiceBtn" onclick="toggleFullChatVoice()" title="Voice input" style="background:none;border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:16px">&#127908;</button>
            <button class="btn btn-primary" onclick="sendFullChat()">Send</button>
        </div>
    </div>
</div>

<script>
function sendFullChat() {
    const input = document.getElementById('fullChatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    const container = document.getElementById('fullChatMessages');
    container.innerHTML += '<div class="msg-bubble msg-outbound">' + _e(msg) + '</div>';
    container.scrollTop = container.scrollHeight;

    // Show typing indicator
    const typing = document.createElement('div');
    typing.className = 'msg-bubble msg-inbound';
    typing.id = 'typingIndicator';
    typing.textContent = 'Thinking...';
    typing.style.opacity = '0.5';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;

    fetch('/api/chat', {
        method: 'POST', headers: _headers(), body: JSON.stringify({ message: msg })
    }).then(r => r.json()).then(res => {
        const ti = document.getElementById('typingIndicator');
        if (ti) ti.remove();
        if (res.reply) {
            container.innerHTML += '<div class="msg-bubble msg-inbound" style="white-space:pre-wrap">' + _e(res.reply) + '</div>';
        } else if (res.error) {
            container.innerHTML += '<div class="msg-bubble msg-inbound" style="color:var(--danger)">' + _e(res.error) + '</div>';
        }
        container.scrollTop = container.scrollHeight;
    }).catch(e => {
        const ti = document.getElementById('typingIndicator');
        if (ti) ti.remove();
        container.innerHTML += '<div class="msg-bubble msg-inbound" style="color:var(--danger)">Error connecting to AI</div>';
    });
}

// Voice input for full chat page (reuses same pattern as base.html)
var _fullVoiceRec = null;
var _fullIsRecording = false;

function _resetFullVoiceBtn(btn) {
    _fullIsRecording = false;
    btn.style.background = 'none';
    btn.style.borderColor = 'var(--border)';
    btn.style.color = '';
    btn.textContent = '\uD83C\uDFA4';
}

function toggleFullChatVoice() {
    var btn = document.getElementById('fullVoiceBtn');
    if (!btn) return;

    var SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechAPI) {
        showToast('Voice input not supported \u2014 try Chrome or Edge', 'error');
        return;
    }
    if (_fullIsRecording) {
        if (_fullVoiceRec) _fullVoiceRec.stop();
        _resetFullVoiceBtn(btn);
        return;
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        showToast('Voice requires HTTPS connection', 'error');
        return;
    }

    _fullVoiceRec = new SpeechAPI();
    _fullVoiceRec.continuous = false;
    _fullVoiceRec.interimResults = true;
    _fullVoiceRec.lang = 'en-CA';
    _fullIsRecording = true;
    btn.style.background = 'var(--danger)';
    btn.style.borderColor = 'var(--danger)';
    btn.style.color = '#fff';
    btn.textContent = '\u23F9';
    var input = document.getElementById('fullChatInput');
    var finalTranscript = '';

    _fullVoiceRec.onresult = function(event) {
        var interim = '';
        for (var i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
            else interim += event.results[i][0].transcript;
        }
        if (input) input.value = finalTranscript + interim;
    };
    _fullVoiceRec.onend = function() {
        _resetFullVoiceBtn(btn);
        if (finalTranscript.trim() && input) { input.value = finalTranscript.trim(); input.focus(); }
    };
    _fullVoiceRec.onerror = function(event) {
        _resetFullVoiceBtn(btn);
        if (event.error === 'not-allowed') {
            showToast('Microphone access denied \u2014 check browser permissions', 'error');
        } else if (event.error === 'no-speech') {
            showToast('No speech detected \u2014 try again', 'info');
        } else if (event.error !== 'aborted') {
            showToast('Voice error: ' + event.error, 'error');
        }
    };
    try {
        _fullVoiceRec.start();
        showToast('Listening... speak now', 'info');
    } catch (e) {
        _resetFullVoiceBtn(btn);
        showToast('Could not start voice input: ' + e.message, 'error');
    }
}
</script>
{% endblock %}
