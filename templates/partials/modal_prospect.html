<!-- Prospect Modal (View / Edit / Add) -->
<div class="modal-overlay" id="prospectModal">
    <div class="modal" style="max-width:600px">
        <button class="modal-close" onclick="closeProspectModal()">&times;</button>

        <!-- ═══ VIEW MODE ═══ -->
        <div id="prospectView">
            <!-- Header: Name + Badges -->
            <div style="margin-bottom:20px">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
                    <div style="min-width:0;flex:1">
                        <h2 style="font-size:18px;font-weight:700;color:var(--text-primary);margin:0;line-height:1.3" id="prospectViewName"></h2>
                        <div style="font-size:12px;color:var(--text-muted);margin-top:4px" id="prospectViewMeta"></div>
                    </div>
                    <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
                        <span id="prospectViewHealth"></span>
                        <span class="badge" id="prospectViewPriority"></span>
                        <span class="badge" id="prospectViewStage"></span>
                    </div>
                </div>
            </div>

            <!-- Next Action Banner -->
            <div id="prospectViewNextAction" style="margin-bottom:16px;padding:10px 14px;background:var(--primary-light);border-left:3px solid var(--primary);border-radius:0 6px 6px 0;font-size:12px;color:var(--text-primary);line-height:1.4"></div>

            <!-- Quick Actions -->
            <div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap">
                <button class="btn btn-primary btn-sm" onclick="prospectAction('call')" style="padding:7px 14px">
                    &#128222; Call
                </button>
                <button class="btn btn-secondary btn-sm" onclick="prospectAction('sms')" style="padding:7px 14px">
                    &#128172; SMS
                </button>
                <button class="btn btn-secondary btn-sm" onclick="prospectAction('email')" style="padding:7px 14px">
                    &#9993; Email
                </button>
                <button class="btn btn-secondary btn-sm" onclick="prospectAction('reschedule')" style="padding:7px 14px">
                    &#128197; Reschedule
                </button>
                <button class="btn btn-secondary btn-sm" onclick="switchToEditMode()" style="margin-left:auto;padding:7px 14px">
                    &#9998; Edit
                </button>
            </div>

            <!-- Contact & Deal Info Cards -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
                <!-- Contact Card -->
                <div style="padding:12px;background:var(--bg-subtle);border-radius:8px">
                    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:500;margin-bottom:8px">Contact</div>
                    <div style="display:flex;flex-direction:column;gap:6px;font-size:12px">
                        <div><span style="color:var(--text-muted);width:50px;display:inline-block">Phone</span> <span id="prospectViewPhone" style="color:var(--text-primary);font-weight:500"></span></div>
                        <div><span style="color:var(--text-muted);width:50px;display:inline-block">Email</span> <span id="prospectViewEmail" style="color:var(--text-primary)"></span></div>
                        <div><span style="color:var(--text-muted);width:50px;display:inline-block">Source</span> <span id="prospectViewSource" style="color:var(--text-primary)"></span></div>
                    </div>
                </div>
                <!-- Deal Card -->
                <div style="padding:12px;background:var(--bg-subtle);border-radius:8px">
                    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:500;margin-bottom:8px">Deal</div>
                    <div style="display:flex;flex-direction:column;gap:6px;font-size:12px">
                        <div><span style="color:var(--text-muted);width:60px;display:inline-block">Product</span> <span id="prospectViewProduct" style="color:var(--text-primary);font-weight:500"></span></div>
                        <div><span style="color:var(--text-muted);width:60px;display:inline-block">AUM</span> <span id="prospectViewAum" style="color:var(--text-primary)"></span></div>
                        <div><span style="color:var(--text-muted);width:60px;display:inline-block">Revenue</span> <span id="prospectViewRevenue" style="color:var(--text-primary)"></span></div>
                    </div>
                </div>
            </div>

            <!-- Timeline: Follow-up + First Contact -->
            <div style="display:flex;gap:16px;margin-bottom:20px;font-size:12px">
                <div style="flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:6px">
                    <div style="color:var(--text-muted);font-size:10px;margin-bottom:2px">Next Follow-up</div>
                    <div id="prospectViewFollowup" style="color:var(--text-primary);font-weight:500"></div>
                </div>
                <div style="flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:6px">
                    <div style="color:var(--text-muted);font-size:10px;margin-bottom:2px">First Contact</div>
                    <div id="prospectViewFirstContact" style="color:var(--text-primary)"></div>
                </div>
            </div>

            <!-- Key Facts (from memory engine) -->
            <div id="prospectViewMemory" style="display:none;margin-bottom:20px">
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:500;margin-bottom:8px">Key Facts</div>
                <div id="prospectViewMemoryContent" style="font-size:12px;padding:10px 12px;background:var(--primary-light);border-left:3px solid var(--primary);border-radius:0 6px 6px 0;white-space:pre-wrap;line-height:1.5;color:var(--text-primary)"></div>
            </div>

            <!-- Notes Timeline -->
            <div style="margin-bottom:20px">
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:500;margin-bottom:8px">Notes</div>
                <div style="display:flex;gap:6px;margin-bottom:10px">
                    <input type="text" class="form-input" id="newNoteInput" placeholder="Add a note..." style="margin:0;flex:1" onkeydown="if(event.key==='Enter')addProspectNote()">
                    <button class="btn btn-primary btn-sm" onclick="addProspectNote()" style="padding:7px 14px">Add</button>
                </div>
                <div id="prospectViewNotes"></div>
            </div>

            <!-- Activity Timeline -->
            <div style="margin-bottom:20px">
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:500;margin-bottom:8px">Recent Activity</div>
                <div id="prospectViewActivities"></div>
            </div>

            <!-- Tasks -->
            <div style="margin-bottom:16px">
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:500;margin-bottom:8px">Tasks</div>
                <div id="prospectViewTasks"></div>
            </div>

            <!-- Merge (collapsed) -->
            <div style="border-top:1px solid var(--border);padding-top:12px">
                <button class="btn btn-secondary btn-sm" onclick="toggleMergeSection()" style="font-size:11px">Merge with another prospect</button>
                <div id="mergeSection" class="hidden" style="margin-top:10px">
                    <div style="display:flex;gap:8px">
                        <input type="text" class="form-input" id="mergeName" placeholder="Name to merge into this prospect" style="margin:0;flex:1">
                        <button class="btn btn-danger btn-sm" onclick="doMerge()">Merge</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══ EDIT / ADD MODE ═══ -->
        <div id="prospectEdit" class="hidden">
            <h2 style="font-size:16px;font-weight:600;color:var(--text-primary);margin:0 0 20px" id="prospectEditTitle">Edit Prospect</h2>
            <form id="prospectForm" onsubmit="return saveProspect(event)">
                <input type="hidden" id="prospectOriginalName" value="">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" class="prospect-form-grid">
                    <div class="form-group">
                        <label class="form-label">Name <span style="color:var(--danger)">*</span></label>
                        <input type="text" class="form-input" id="pName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-input" id="pPhone">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="pEmail">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Product</label>
                        <input type="text" class="form-input" id="pProduct" list="productList">
                        <datalist id="productList">
                            <option value="Life Insurance">
                            <option value="Disability Insurance">
                            <option value="Wealth Management">
                            <option value="Home Insurance">
                            <option value="Auto Insurance">
                            <option value="Commercial Insurance">
                            <option value="Term 10">
                            <option value="Term 20">
                            <option value="Term 30">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stage</label>
                        <select class="form-input form-select" id="pStage">
                            <option value="New Lead">New Lead</option>
                            <option value="Contacted">Contacted</option>
                            <option value="Discovery Call">Discovery Call</option>
                            <option value="Needs Analysis">Needs Analysis</option>
                            <option value="Plan Presentation">Plan Presentation</option>
                            <option value="Proposal Sent">Proposal Sent</option>
                            <option value="Negotiation">Negotiation</option>
                            <option value="Nurture">Nurture</option>
                            <option value="Closed-Won">Closed-Won</option>
                            <option value="Closed-Lost">Closed-Lost</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Priority</label>
                        <select class="form-input form-select" id="pPriority">
                            <option value="Hot">Hot</option>
                            <option value="Warm">Warm</option>
                            <option value="Cold">Cold</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">AUM</label>
                        <input type="text" class="form-input" id="pAum" placeholder="e.g. 500K">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Revenue / Premium</label>
                        <input type="text" class="form-input" id="pRevenue" placeholder="e.g. 5000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Source</label>
                        <input type="text" class="form-input" id="pSource" list="sourceList">
                        <datalist id="sourceList">
                            <option value="Referral">
                            <option value="Cold Call">
                            <option value="Networking Event">
                            <option value="Website">
                            <option value="Walk-in">
                            <option value="Social Media">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Next Follow-up</label>
                        <input type="date" class="form-input" id="pFollowup">
                    </div>
                </div>
                <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap">
                    <button type="button" class="btn btn-danger btn-sm" id="prospectDeleteBtn" onclick="deleteProspect()" style="margin-right:auto">Delete</button>
                    <button type="button" class="btn btn-secondary" onclick="cancelProspectEdit()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
