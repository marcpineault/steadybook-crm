<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started — Calm Money CRM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: var(--bg-page, #f8f9fb); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .register-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 480px; }
        .register-card h1 { font-size: 24px; margin-bottom: 4px; }
        .register-card .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        .register-card .form-group { margin-bottom: 16px; }
        .register-card label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .register-card input, .register-card select { width: 100%; padding: 10px 12px; border: 1px solid var(--border, #e5e7eb); border-radius: 8px; font-size: 14px; }
        .register-card .btn-primary { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; }
        .register-card .error { color: var(--danger, #e74c3c); font-size: 13px; margin-top: 8px; display: none; }
        .register-card .login-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
        .register-card .login-link a { color: var(--primary, #6366f1); }
        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; font-size: 12px; color: var(--text-secondary); }
        .features div::before { content: '\2713 '; color: var(--success, #10b981); font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>Start your CRM</h1>
        <div class="sub">Built for insurance & financial advisors. Set up in 2 minutes.</div>

        <div class="features">
            <div>AI follow-ups</div>
            <div>SMS sequences</div>
            <div>Pipeline tracking</div>
            <div>Compliance built-in</div>
            <div>Lead scoring</div>
            <div>Meeting reminders</div>
        </div>

        <form onsubmit="register(event)">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="regName" required placeholder="Marc Pineault">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="regCompany" placeholder="Co-operators">
                </div>
            </div>
            <div class="form-group">
                <label>Workspace Name</label>
                <input type="text" id="regWorkspace" required placeholder="e.g. Smith Insurance" oninput="autoSlug()">
            </div>
            <div class="form-group">
                <label>Workspace URL</label>
                <div style="display:flex;align-items:center;gap:4px">
                    <input type="text" id="regSlug" required placeholder="smith-insurance" pattern="[a-z0-9-]{3,50}" style="flex:1">
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPass" required minlength="8" placeholder="Min 8 characters">
            </div>
            <div class="form-group">
                <label>Timezone</label>
                <select id="regTimezone">
                    <option value="America/Toronto">Eastern (Toronto)</option>
                    <option value="America/Chicago">Central (Chicago)</option>
                    <option value="America/Denver">Mountain (Denver)</option>
                    <option value="America/Los_Angeles">Pacific (LA)</option>
                    <option value="America/Vancouver">Pacific (Vancouver)</option>
                    <option value="America/Edmonton">Mountain (Edmonton)</option>
                    <option value="America/Winnipeg">Central (Winnipeg)</option>
                    <option value="America/Halifax">Atlantic (Halifax)</option>
                </select>
            </div>
            <div class="error" id="regError"></div>
            <button type="submit" class="btn btn-primary" id="regBtn">Create My Workspace</button>
        </form>
        <div class="login-link">Already have an account? <a href="/login">Sign in</a></div>
    </div>
    <script>
    function autoSlug() {
        var name = document.getElementById('regWorkspace').value;
        document.getElementById('regSlug').value = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 50);
    }
    function register(e) {
        e.preventDefault();
        var btn = document.getElementById('regBtn');
        var err = document.getElementById('regError');
        btn.disabled = true;
        btn.textContent = 'Creating...';
        err.style.display = 'none';

        fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: document.getElementById('regWorkspace').value,
                slug: document.getElementById('regSlug').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPass').value,
                owner_name: document.getElementById('regName').value,
                company: document.getElementById('regCompany').value,
                timezone: document.getElementById('regTimezone').value,
            })
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.ok) {
                // Auto-login after registration
                fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPass').value,
                    })
                }).then(function() { window.location.href = '/'; });
            } else {
                err.textContent = data.error || 'Registration failed';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create My Workspace';
            }
        }).catch(function() {
            err.textContent = 'Network error. Please try again.';
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Create My Workspace';
        });
    }
    </script>
</body>
</html>
