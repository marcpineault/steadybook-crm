<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Calm Money{% endblock %} — Pipeline CRM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        .chat-panel {
            position: fixed;
            bottom: 80px;
            right: 24px;
            width: 360px;
            max-height: 480px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            z-index: 998;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-panel.hidden {
            display: none;
        }
        .chat-panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border, #e5e7eb);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-panel-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            max-height: 340px;
        }
        .chat-panel-composer {
            padding: 8px 12px;
            border-top: 1px solid var(--border, #e5e7eb);
            display: flex;
            gap: 8px;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="layout">
        {% include "partials/sidebar.html" %}
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Modals -->
    {% include "partials/modal_prospect.html" %}
    {% include "partials/modal_task.html" %}
    {% include "partials/modal_log.html" %}

    <!-- Chat FAB (floating action button) -->
    <button class="chat-fab" onclick="toggleChat()" title="AI Chat">&#9883;</button>

    <!-- Chat panel (slides up from FAB) -->
    <div id="chatPanel" class="chat-panel hidden">
        <div class="chat-panel-header">
            <span class="font-bold">AI Assistant</span>
            <button onclick="toggleChat()" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-secondary)">&times;</button>
        </div>
        <div id="chatMessages" class="chat-panel-messages"></div>
        <div class="chat-panel-composer">
            <input type="text" id="chatInput" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendChatMessage()">
            <button class="btn btn-primary btn-sm" onclick="sendChatMessage()">Send</button>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast" class="toast"></div>

    <!-- Mobile: sidebar backdrop -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileMenu()"></div>

    <!-- Mobile menu toggle -->
    <button class="menu-toggle" onclick="toggleMobileMenu()" aria-label="Menu">&#9776;</button>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
    function toggleMobileMenu() {
        document.querySelector('.sidebar').classList.toggle('open');
        document.getElementById('sidebarBackdrop').classList.toggle('active');
        document.body.style.overflow = document.querySelector('.sidebar').classList.contains('open') ? 'hidden' : '';
    }
    function closeMobileMenu() {
        document.querySelector('.sidebar').classList.remove('open');
        document.getElementById('sidebarBackdrop').classList.remove('active');
        document.body.style.overflow = '';
    }
    // Close sidebar when a link is clicked (mobile)
    document.querySelectorAll('.sidebar-item').forEach(function(item) {
        item.addEventListener('click', closeMobileMenu);
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
